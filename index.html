<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Breach — Legal</title>
    <style>
        :root {
            --bg: #0a0e14;
            --surface: #131820;
            --text: #c5cdd9;
            --heading: #e0e6ed;
            --accent: #00e5ff;
            --link: #00e5ff;
            --border: #1e2630;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: var(--bg);
            min-height: 100vh;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            color: var(--text);
            line-height: 1.7;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: var(--accent);
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
            letter-spacing: 0.02em;
        }
        .subtitle {
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        a.doc-link {
            display: block;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 0 4px 4px 0;
            color: var(--link);
            text-decoration: none;
            padding: 1rem 1.25rem;
            font-size: 1.05rem;
            transition: border-color 0.15s ease, background 0.15s ease;
        }
        a.doc-link:hover {
            background: #1a212c;
            border-color: var(--accent);
        }
        .footer {
            margin-top: 2.5rem;
            color: #6b7a8d;
            font-size: 0.85rem;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg: #ffffff;
                --surface: #f5f7fa;
                --text: #374151;
                --heading: #111827;
                --accent: #0077b6;
                --link: #0077b6;
                --border: #e5e7eb;
            }
            a.doc-link:hover { background: #eef2f7; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Neural Breach</h1>
    <p class="subtitle">Legal Documents</p>

    <div class="links">
        <a class="doc-link" href="privacy-policy.html">Privacy Policy</a>
        <a class="doc-link" href="terms-of-service.html">Terms of Service</a>
        <a class="doc-link" href="data-deletion.html">Data &amp; Account Deletion</a>
    </div>

    <div class="footer">
        &copy; 2026 Leonid Korsakov
    </div>
</div>
</body>
</html>
